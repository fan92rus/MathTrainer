<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">

    <!-- SEO -->
    <title>Математический тренажер для детей 1-4 классов</title>
    <meta name="description" content="Бесплатный математический тренажер для детей 1-4 классов. Счёт, умножение, уравнения, вычитание в столбик. Адаптивная сложность по классу и четверти.">
    <meta name="keywords" content="математика, тренажер, дети, 1 класс, 2 класс, 3 класс, 4 класс, таблица умножения, примеры, счет, начальная школа">
    <meta name="theme-color" content="#667eea">
    <meta name="color-scheme" content="light">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/MathTrainer/favicon.svg">
    <link rel="apple-touch-icon" href="/MathTrainer/icon-192.png">

    <!-- Open Graph (WhatsApp, Telegram, VK) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Математический тренажер для детей">
    <meta property="og:description" content="Тренажер по математике для 1-4 классов. Счёт, умножение, уравнения — с геймификацией и без рекламы.">
    <meta property="og:image" content="/MathTrainer/icon-512.png">
    <meta property="og:url" content="https://fan92rus.github.io/MathTrainer/">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:site_name" content="МатТренажер">

    <!-- PWA -->
    <link rel="manifest" href="/MathTrainer/manifest.json">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="math-trainer-app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Регистрация Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/MathTrainer/sw.js').catch(() => {
            // SW не критичен — silently fail
          });
        });
      }
    </script>
</body>
</html>
